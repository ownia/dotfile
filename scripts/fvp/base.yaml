%YAML 1.2
---
description: >-
  Cutsom shrinkwrap config

concrete: true

layers:
  - FVP_Base_RevC-2xAEMvA-base.yaml
  - arch/v9.7.yaml
  - tfa-base.yaml
  - dt-base.yaml
  - ns-edk2-base.yaml

build:
  tfa:
    repo:
      remote: https://git.trustedfirmware.org/TF-A/trusted-firmware-a.git
      revision: master
    # Update this if shrinkwrap set FEATURE_DETECTION to 0 or upstream changes
    prebuild:
      - sed -i 's/ID_AA64PFR0_DIT, 1U, 1U,/ID_AA64PFR0_DIT, 1U, 2U,/' include/arch/aarch64/arch_features.h
    params:
      ENABLE_FEAT_MTE2: 1
      ENABLE_SVE_FOR_NS: 1
      ENABLE_SVE_FOR_SWD: 1
      ENABLE_SME_FOR_NS: 1
      ENABLE_SME_FOR_SWD: 1
      ENABLE_SME2_FOR_NS: 1

  acpica:
    repo:
      remote: https://github.com/acpica/acpica.git
      revision: 20250807

  edk2:
    repo:
      edk2:
        remote: https://github.com/tianocore/edk2.git
        revision: 8b3b2a64886f6ce6a987421668d1beb8ddff1e49
      edk2-platforms:
        remote: https://github.com/tianocore/edk2-platforms.git
        revision: 17893ae84e968214ee6db15bf7502531d9034260

  # Patch the generated device tree to add the EL2 virtual timer (hyp-virt)
  # PPI that fvp-base-revc.dts omits. Without it, a VHE kernel running at EL2
  # warns "VHE-capable CPU without EL2 virtual timer interrupt" and falls back
  # to the EL2 physical timer. This postbuild runs after dt-base.yaml builds
  # dt_bootargs.dtb and redefines the /timer interrupts with all 5 PPIs. The
  # overlay is applied to the decompiled DTB, so GIC_PPI/IRQ_TYPE_LEVEL_LOW
  # macros are unavailable: use raw cells (GIC_PPI=1, IRQ_TYPE_LEVEL_LOW=8).
  dt:
    postbuild:
      - DTB_FINAL=${param:builddir}/dt_bootargs.dtb
      - >-
          OVERLAY="/ {
            timer {
              interrupts = <1 13 8>, <1 14 8>, <1 11 8>, <1 10 8>, <1 12 8>;
            };
          };"
      - ( dtc -q -O dts -I dtb $${DTB_FINAL} ; echo -e "$${OVERLAY}" ) | dtc -q -O dtb -o $${DTB_FINAL}

run:
  params:
    -C cluster0.memory_tagging_support_level: 2
    -C cluster1.memory_tagging_support_level: 2
    -C bp.dram_metadata.is_enabled: 1
